<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ProctorNet - Invigilator Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline": "#737686",
                        "on-secondary-fixed-variant": "#004395",
                        "secondary": "#0058be",
                        "inverse-on-surface": "#eef0ff",
                        "on-secondary-container": "#fefcff",
                        "background": "#faf8ff",
                        "secondary-fixed": "#d8e2ff",
                        "error": "#ba1a1a",
                        "on-primary-fixed": "#00174b",
                        "on-surface": "#131b2e",
                        "surface-tint": "#0053db",
                        "on-tertiary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary": "#ffffff",
                        "secondary-container": "#2170e4",
                        "on-tertiary-fixed": "#001f26",
                        "tertiary-container": "#00788c",
                        "on-primary-fixed-variant": "#003ea8",
                        "surface-dim": "#d2d9f4",
                        "primary-fixed": "#dbe1ff",
                        "on-primary-container": "#eeefff",
                        "tertiary-fixed": "#acedff",
                        "surface-container-highest": "#dae2fd",
                        "on-error": "#ffffff",
                        "on-primary": "#ffffff",
                        "tertiary": "#005e6e",
                        "tertiary-fixed-dim": "#4cd7f6",
                        "surface-container-low": "#f2f3ff",
                        "surface-bright": "#faf8ff",
                        "primary-container": "#2563eb",
                        "on-surface-variant": "#434655",
                        "inverse-primary": "#b4c5ff",
                        "inverse-surface": "#283044",
                        "surface-variant": "#dae2fd",
                        "on-tertiary-container": "#d7f6ff",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed-variant": "#004e5c",
                        "surface-container": "#eaedff",
                        "primary-fixed-dim": "#b4c5ff",
                        "secondary-fixed-dim": "#adc6ff",
                        "on-secondary-fixed": "#001a42",
                        "outline-variant": "#c3c6d7",
                        "on-error-container": "#93000a",
                        "surface": "#faf8ff",
                        "on-background": "#131b2e",
                        "primary": "#004ac6",
                        "surface-container-high": "#e2e7ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "1.5rem",
                        "sidebar-width": "260px",
                        "stack-sm": "0.5rem",
                        "margin-page": "2rem",
                        "stack-md": "1rem",
                        "container-max": "1440px"
                    },
                    "fontFamily": {
                        "page-title": ["Inter"],
                        "section-title": ["Inter"],
                        "body": ["Inter"],
                        "card-title": ["Inter"],
                        "caption": ["Inter"]
                    },
                    "fontSize": {
                        "page-title": ["22px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "section-title": ["18px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "card-title": ["16px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "caption": ["12px", { "lineHeight": "16px", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface-container-low min-h-screen flex items-center justify-center p-4">
<!-- Login Container -->
<main class="w-full max-w-[480px] bg-surface rounded-[16px] border border-outline-variant shadow-sm overflow-hidden flex flex-col">
<!-- Header -->
<header class="pt-8 pb-6 px-8 flex flex-col items-center text-center border-b border-outline-variant bg-surface-bright">
<div class="h-12 w-12 bg-primary rounded-lg flex items-center justify-center mb-4 shadow-sm">
<span class="material-symbols-outlined text-on-primary text-[28px]" data-icon="shield_person">shield_person</span>
</div>
<h1 class="font-page-title text-page-title text-on-surface mb-1">ProctorNet</h1>
<p class="font-body text-body text-on-surface-variant">Invigilator Secure Access Portal</p>
</header>
<!-- Form Content -->
<div class="p-8">
<form action="#" class="space-y-6" method="POST">
<!-- Exam ID -->
<div class="space-y-2">
<label class="font-caption text-caption text-on-surface-variant uppercase tracking-wider block" for="exam-id">Exam Session ID</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant text-[20px]" data-icon="tag">tag</span>
<input class="w-full pl-10 pr-4 py-2.5 bg-surface border border-outline-variant rounded-lg font-body text-body text-on-surface focus:border-primary focus:ring-2 focus:ring-primary-fixed focus:outline-none transition-all placeholder:text-outline-variant" id="exam-id" name="exam-id" placeholder="e.g. EXM-2024-89A" type="text"/>
</div>
</div>
<!-- Invigilator ID -->
<div class="space-y-2">
<label class="font-caption text-caption text-on-surface-variant uppercase tracking-wider block" for="invigilator-id">Invigilator ID</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant text-[20px]" data-icon="badge">badge</span>
<input class="w-full pl-10 pr-4 py-2.5 bg-surface border border-outline-variant rounded-lg font-body text-body text-on-surface focus:border-primary focus:ring-2 focus:ring-primary-fixed focus:outline-none transition-all placeholder:text-outline-variant" id="invigilator-id" name="invigilator-id" placeholder="Enter your institutional ID" type="text"/>
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<label class="font-caption text-caption text-on-surface-variant uppercase tracking-wider block" for="password">Access Passcode</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant text-[20px]" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-10 py-2.5 bg-surface border border-outline-variant rounded-lg font-body text-body text-on-surface focus:border-primary focus:ring-2 focus:ring-primary-fixed focus:outline-none transition-all placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Identity Verification Upload -->
<div class="space-y-2 pt-2">
<label class="font-caption text-caption text-on-surface-variant uppercase tracking-wider block">Identity Verification</label>
<div class="border-2 border-dashed border-outline-variant rounded-lg p-6 bg-surface-container-lowest text-center hover:border-primary transition-colors cursor-pointer group">
<div class="flex flex-col items-center gap-2">
<div class="h-10 w-10 rounded-full bg-surface-container-low flex items-center justify-center group-hover:bg-primary-fixed transition-colors">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors" data-icon="upload_file">upload_file</span>
</div>
<div class="font-body text-body text-on-surface">
<span class="text-primary font-semibold">Click to upload</span> or drag and drop
                            </div>
<p class="font-caption text-caption text-on-surface-variant">Upload Faculty/Staff ID Card (JPG, PNG)</p>
</div>
</div>
</div>
<!-- Submit Action -->
<div class="pt-4">
<button class="w-full bg-primary text-on-primary font-card-title text-card-title py-3 rounded-lg shadow-sm hover:bg-primary-container transition-colors flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="login">login</span>
                        Verify &amp; Access Dashboard
                    </button>
</div>
</form>
</div>
<!-- Footer Info -->
<div class="bg-surface-container-low px-8 py-4 border-t border-outline-variant text-center">
<p class="font-caption text-caption text-on-surface-variant flex items-center justify-center gap-1.5">
<span class="material-symbols-outlined text-[16px]" data-icon="lock_clock">lock_clock</span>
                Session is end-to-end encrypted
            </p>
</div>
</main>
</body></html>
